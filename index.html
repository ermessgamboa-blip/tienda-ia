<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tienda IA</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; padding: 20px; }
        #chatBox { border: 1px solid #444; height: 300px; overflow-y: scroll; margin-bottom: 10px; padding: 10px; }
        #productCard { display: none; background: #333; padding: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>Tienda IA</h1>
    <div id="productCard">Catálogo de Productos</div>
    <div id="chatBox"></div>
    <input type="text" id="userInput" placeholder="Escribe aquí...">
    <button onclick="sendPrompt()">Enviar</button>

    <script>
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const productCard = document.getElementById('productCard');

        async function sendPrompt() {
            const text = userInput.value.trim();
            if (!text) return;
            chatBox.innerHTML += '<p>Usuario: ' + text + '</p>';
            userInput.value = '';

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();
                chatBox.innerHTML += '<p>IA: ' + data.reply + '</p>';
                if (text.toLowerCase().includes('catálogo')) productCard.style.display = 'block';
            } catch (e) {
                chatBox.innerHTML += '<p>Error de conexión</p>';
            }
        }
    </script>
</body>
</html>
