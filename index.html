<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soberanía Tecnológica</title>
    <style>
        :root { --bg: #f5f3ef; --accent: #c5a073; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; margin: 0; color: #333; }
        .hero { padding: 60px 20px; text-align: center; }
        .hero h1 { font-size: 2.5em; font-weight: 200; letter-spacing: -1px; margin-bottom: 10px; }
        
        /* El efecto "flotante" */
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 30px;
            border-radius: 24px;
            margin: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }
        
        .btn-premium {
            background: #222; color: #fff; padding: 18px 30px;
            border-radius: 50px; text-decoration: none; display: inline-block;
            transition: transform 0.3s;
        }
        .btn-premium:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Google AI Studio</h1>
        <p>Tu soberanía tecnológica, redefinida.</p>
    </div>
    
    <div class="glass-card">
        <h3>Gemini Advanced</h3>
        <p>La inteligencia que se adapta a tu ritmo en Tánger.</p>
        <a href="https://wa.me/212773864709" class="btn-premium">Comenzar experiencia</a>
    </div>
</body>
</html>
