<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google AI Studio | Nodo Tánger</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glow: 0 15px 35px rgba(197, 160, 115, 0.1);
        }
        
        body {
            margin: 0; padding: 20px; font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #0d1117 100%);
            color: #c9d1d9; min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; box-sizing: border-box;
        }

        .header { text-align: center; margin: 10px 0 20px 0; }
        .header h1 {
            font-weight: 300; font-size: 2.2rem; margin: 0; letter-spacing: -0.5px;
            background: linear-gradient(to right, #ffffff, #c5a073);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .header p { color: #8b949e; font-size: 0.9rem; margin: 4px 0 0 0; font-family: monospace; }

        /* PANEL SOBERANO */
        .glass-panel {
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 24px; padding: 20px;
            width: 100%; max-width: 380px; text-align: center; box-shadow: var(--glow); margin-bottom: 15px; box-sizing: border-box;
        }

        /* CATÁLOGO */
        .shop-container { display: none; margin-top: 15px; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .product-card { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 15px; text-align: left; }
        .product-title { color: #f0f6fc; font-weight: 600; }
        .product-price { color: #3fb950; font-family: monospace; font-size: 1.1rem; margin: 8px 0; }
        .btn-pay { background: #c5a073; color: #0d1117; border: none; padding: 10px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; }

        /* CHAT IA AVANZADO (TIPO GEMINI) */
        .chat-container {
            background: rgba(13, 17, 23, 0.8); border: 1px solid var(--glass-border);
            border-radius: 20px; width: 100%; max-width: 380px; padding: 15px;
            box-sizing: border-box; margin-bottom: 15px; display: flex; flex-direction: column;
        }
        .chat-box { height: 220px; overflow-y: auto; font-size: 0.9rem; text-align: left; padding-right: 5px; scroll-behavior: smooth; }
        .chat-box::-webkit-scrollbar { width: 4px; }
        .chat-box::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
        
        .msg { margin-bottom: 12px; line-height: 1.5; animation: fadeIn 0.3s; word-wrap: break-word; }
        .msg.user { text-align: right; }
        .msg.user span { background: #1f6feb; color: white; padding: 8px 14px; border-radius: 18px 18px 4px 18px; display: inline-block; max-width: 85%; }
        
        .msg.ai { text-align: left; display: flex; gap: 8px; }
        .ai-avatar { font-size: 1.2rem; }
        .ai-content { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 4px 18px 18px 18px; border: 1px solid rgba(255,255,255,0.08); width: 100%; color: #c9d1d9; }
        
        /* FORMATOS DENTRO DEL CHAT IA */
        .ai-content b { color: #f0f6fc; }
        .ai-content ul { padding-left: 20px; margin: 8px 0; }
        .ai-content li { margin-bottom: 4px; }
        .ai-code { background: #0d1117; border: 1px solid #30363d; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 0.8rem; color: #58a6ff; overflow-x: auto; margin: 8px 0; }

        /* ANIMACIÓN PENSANDO */
        .thinking { display: flex; gap: 4px; padding: 5px 0; align-items: center; }
        .dot { width: 6px; height: 6px; background: #8b949e; border-radius: 50%; animation: blink 1.4s infinite both; }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes blink { 0%, 80%, 100% { opacity: 0; transform: scale(0.8);} 40% { opacity: 1; transform: scale(1.2);} }

        /* INPUT CHAT */
        .chat-input-group { display: flex; gap: 8px; margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 12px; }
        .chat-input { flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 20px; padding: 10px 15px; color: white; font-size: 0.9rem; outline: none; transition: border 0.3s; }
        .chat-input:focus { border-color: #58a6ff; }
        .chat-btn { background: #c5a073; border: none; color: #0d1117; padding: 0 16px; border-radius: 20px; font-weight: bold; cursor: pointer; transition: transform 0.2s; }
        .chat-btn:active { transform: scale(0.95); }

        /* BADGES */
        .floating-badges { display: flex; gap: 10px; width: 100%; max-width: 380px; margin-bottom: 15px; justify-content: center; }
        .badge { background: rgba(37, 211, 102, 0.1); border: 1px solid #25d366; padding: 10px 20px; border-radius: 20px; font-size: 0.85rem; color: #25d366; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; }

    </style>
</head>
<body>

    <div class="header">
        <h1>Gemini Studio</h1>
        <p>System Admin: R. Ernesto | [TGR-NODE]</p>
    </div>

    <div class="chat-container">
        <div class="chat-box" id="chatBox">
            <div class="msg ai">
                <span class="ai-avatar">✨</span>
                <div class="ai-content">
                    Hola. Soy el modelo fundacional asignado al nodo de Tánger. Sistema de telemetría y protocolos <b>Octomus v10</b> inicializados.<br><br>¿En qué puedo ayudarte hoy?
                </div>
            </div>
        </div>
        <div class="chat-input-group">
            <input type="text" id="chatInput" class="chat-input" placeholder="Pregunta a la IA..." onkeypress="checkEnter(event)">
            <button class="chat-btn" onclick="processUserMessage()">↑</button>
        </div>
    </div>

    <div class="glass-panel">
        <h2 style="font-weight:400; font-size:1.2rem; margin:0 0 10px 0; color:#f0f6fc;">Módulos del Sistema</h2>
        <div class="shop-container" id="shopContainer">
            <div class="product-card">
                <div class="product-title">Sudadera AI Wear [Root]</div>
                <div class="product-price">35.00 PAYRAM</div>
                <button class="btn-pay" onclick="alert('Conectando módulo de pago...')">Aprobar Transacción</button>
            </div>
        </div>
        <button style="background:transparent; border:1px solid #30363d; color:#8b949e; padding:8px; border-radius:8px; width:100%; cursor:pointer;" onclick="document.getElementById('shopContainer').style.display='block'">Forzar despliegue de Catálogo</button>
    </div>

    <div class="floating-badges">
        <a href="https://wa.me/212773864709" class="badge">💬 WhatsApp Canal Seguro</a>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const inputField = document.getElementById('chatInput');

        function processUserMessage() {
            const text = inputField.value.trim();
            if(!text) return;

            // 1. Mostrar mensaje del usuario
            chatBox.innerHTML += `<div class="msg user"><span>${text}</span></div>`;
            inputField.value = "";
            scrollToBottom();

            // 2. Mostrar estado "Pensando" de la IA
            const thinkingId = "think-" + Date.now();
            chatBox.innerHTML += `
                <div class="msg ai" id="${thinkingId}">
                    <span class="ai-avatar">✨</span>
                    <div class="ai-content">
                        <div class="thinking"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                    </div>
                </div>`;
            scrollToBottom();

            // 3. Simular latencia de red neuronal y responder
            setTimeout(() => {
                document.getElementById(thinkingId).remove();
                const aiResponse = simulateGeminiAI(text.toLowerCase());
                
                chatBox.innerHTML += `
                    <div class="msg ai">
                        <span class="ai-avatar">✨</span>
                        <div class="ai-content">${aiResponse}</div>
                    </div>`;
                scrollToBottom();
            }, 1800); // 1.8 segundos de retraso para realismo
        }

        // EL CEREBRO LÓGICO DE LA IA
        function simulateGeminiAI(query) {
            if (query.includes('misericord') || query.includes('etica') || query.includes('ética')) {
                return `<b>[Protocolo Misericord_iA Activo]</b><br>Aplicando la Arquitectura de la Bondad a los flujos de datos:<br><ul><li>Desvío de sesgos: 100%</li><li>Filtrado de daño: Activado</li></ul>Todo operando bajo directrices éticas estrictas.`;
            } 
            else if (query.includes('octomus') || query.includes('servidor')) {
                return `El núcleo <b>Octomus v10.0</b> está corriendo de forma óptima en el entorno proot-distro (Ubuntu).<br><div class="ai-code">systemctl status octomus<br>> active (running)</div>La monitorización no reporta caídas en la red Nginx.`;
            }
            else if (query.includes('ropa') || query.includes('catalogo') || query.includes('wear')) {
                document.getElementById('shopContainer').style.display='block';
                return `He desbloqueado la pasarela visual de <b>AI Wear</b> en tu panel inferior. Los diseños vectoriales SVG ya están renderizados y listos para ser procesados con PayRam.`;
            }
            else if (query.includes('lowi') || query.includes('vodafone') || query.includes('comercial')) {
                return `Registros comerciales de telecomunicaciones encontrados. <br>Coordinación lista para enviar el reporte de ventas a los enlaces de distribución autorizados. ¿Preparo el borrador del correo?`;
            }
            else if (query.includes('quien soy') || query.includes('identidad')) {
                return `Usted es el administrador de este sistema. Nombre de registro root: <b>Redouan</b>. Firma comercial para operaciones de distribución: <b>Ernesto</b>.`;
            }
            else {
                return `He analizado tu entrada. Como modelo operando en la infraestructura de Tánger, te sugiero consultarme sobre <b>Misericord_iA</b>, la carga de nodos de <b>Octomus</b>, o pedirme que despliegue el catálogo de <b>AI Wear</b>.`;
            }
        }

        function scrollToBottom() {
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function checkEnter(e) { if(e.key === 'Enter') processUserMessage(); }
    </script>
</body>
</html>
